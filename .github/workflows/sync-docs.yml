name: Sync Chinese Docs

on:
  push:
    branches:
      - main
    paths:
      - 'CLAUDE.md'
      - 'AGENTS.md'

permissions:
  contents: write

jobs:
  sync:
    name: Sync Chinese translation files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync docs
        run: node scripts/sync-docs.ts

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet HEAD -- '*.zh.md'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '*.zh.md'
          git commit -m "chore: sync Chinese docs from GitNexus update

Auto-sync CLAUDE.zh.md and AGENTS.zh.md after CLAUDE.md / AGENTS.md
were updated by GitNexus analyze.

🤖 Generated with [Claude Code](https://claude.com/claude-code)"
          git push
