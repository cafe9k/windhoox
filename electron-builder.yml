appId: com.windhoox.desktop
productName: Windhoox
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
asar: true
npmRebuild: false
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
  - package.json
mac:
  target:
    - dmg
  category: public.app-category.productivity
  identity: null
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
